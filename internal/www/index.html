<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess</title>
    <link rel="shortcut icon" href="/static/pb.svg" type="image/svg">

    <link rel="stylesheet" href="/static/main.css">
    <script src="/static/main.js" async defer></script>
</head>

<body>
    <div id="board">
        <!-- content replaced dynamically -->
    </div>
    <dialog id="promotion">
        <form method="dialog">
            <div id="dialog-content">
                <button class="tile" type="submit" value="q">
                    <img class="piece" src="/static/qw.svg" draggable="false">
                </button>
                <button class="tile" type="submit" value="r">
                    <img class="piece" src="/static/rw.svg" draggable="false">
                </button>
                <button class="tile" type="submit" value="b">
                    <img class="piece" src="/static/bw.svg" draggable="false">
                </button>
                <button class="tile" type="submit" value="n">
                    <img class="piece" src="/static/nw.svg" draggable="false">
                </button>
            </div>
            <div>
                <button id="closeModal" type="reset">Close</button>
            </div>
        </form>
    </dialog>
</body>

</html>
