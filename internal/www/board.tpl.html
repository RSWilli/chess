<div id="board">
    <span></span>
    {{ range $j, $file := files }}
    <span>{{ $file }}</span>
    {{ end}}
    <span></span>
    <!-- board tiles -->
    {{ range $i, $rank := ranks }}
    <span>{{ $rank }}</span>
    {{ range $j, $file := files }}
    {{- $move := $.MoveTo $j $i }}
    <div class="tile {{ $.ClassesFor $j $i }}" data-square="{{ $file }}{{ $rank }}"
    {{ if $move }}
    data-move="{{ $move }}"
    {{ end }}
    >
        {{ $pieceAt := $.PieceAt $j $i }}
        {{ if $pieceAt}}
        <img class="piece" src="{{ $pieceAt }}" draggable="false">
        {{ end }}
    </div>
    {{ end}}
    <span>{{ $rank }}</span>
    {{ end}}
    <!-- after board tiles: -->
    <span></span>
    {{ range $j, $file := files }}
    <span>{{ $file }}</span>
    {{ end}}
    <span></span>
</div>
